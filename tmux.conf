##### ──────────────────────────────────────────────
#####  General Settings
##### ──────────────────────────────────────────────

set -g mouse on
setw -g mode-keys vi
set-option -g remain-on-exit on

# Clipboard in visual mode
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -sel clip -i"
bind -T copy-mode-vi C-c send-keys -X copy-pipe-and-cancel "xclip -sel clip -i"
bind -T copy-mode y send-keys -X copy-pipe-and-cancel "xclip -sel clip -i"
set-option -g set-clipboard on

# Reduce escape delay (critical for Neovim responsiveness)
set -sg escape-time 0

# Faster key repeat
set -g repeat-time 300

# Increase scrollback
set -g history-limit 50000

# Pass through WAYLAND_DISPLAY for clipboard (xclip) in WSL
set -ga update-environment "WAYLAND_DISPLAY"

# Truecolor + cursor shape + synchronized output
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[6 q'
set -ga terminal-features ",*:Sync"

##### ──────────────────────────────────────────────
#####  Key Bindings
##### ──────────────────────────────────────────────

# Split panes in same directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# New windows in same directory
bind c new-window -c "#{pane_current_path}"

# Resize panes. tmux defaults Alt+arrows to 5 cells; use 8 cells (~50% more).
bind -r M-Up resize-pane -U 8
bind -r M-Down resize-pane -D 8
bind -r M-Left resize-pane -L 8
bind -r M-Right resize-pane -R 8

# Reorder windows by swapping with occupied slots
bind -r < swap-window -d -t :-1 \; display-message "⇠ swapped window left"
bind -r > swap-window -d -t :+1 \; display-message "swapped window right ⇢"

# Swap current window with a target index. Unlike move-window, occupied targets work.
bind . command-prompt -p "Swap with window index:" "swap-window -d -t '%%'"

# Interactively reorder the current window with a live preview.
bind W display-popup -E -w 90% -h 80% -S "fg=#00ffff" -s "bg=#05070d,fg=#00e5ff" -T " GRID REORDER " "$HOME/.config/tmux/scripts/reorder-window-preview"

# Quick reload (prefix + r)
bind r source-file ~/.config/tmux/tmux.conf \; display-message "🔁 Reloaded tmux.conf"

##### ──────────────────────────────────────────────
#####  Plugins (TPM)
##### ──────────────────────────────────────────────

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/"
run '~/.config/tmux/plugins/tpm/tpm'

##### ──────────────────────────────────────────────
#####  ⚡ CYAN NEON THEME
##### ──────────────────────────────────────────────

# Palette
set -g @primary '#00e5ff'     # Neon cyan
set -g @background '#0f111a'  # Deep dark background
set -g @text '#c5c8c6'        # Soft white text
set -g @muted '#5c6370'       # Dim grey
set -g @highlight '#00ffff'   # Brighter cyan

# Status bar
set -g status on
set -g status-style "bg=#05070d,fg=#00e5ff"
set -g status-interval 1
set -g status-justify centre

# Prefix-aware session HUD on left
set -g status-left-length 40
set -g status-left "#[fg=#05070d,bg=#{?client_prefix,#00ffff,#00e5ff},bold] #{?client_prefix,PREFIX,GRID #S} #[fg=#{?client_prefix,#00ffff,#00e5ff},bg=#05070d]"

# Right side: live clock and host
set -g status-right-length 120
set -g status-right "#[fg=#00e5ff]#[fg=#05070d,bg=#00e5ff,bold] %Y-%m-%d #[fg=#00e5ff,bg=#05070d]#[fg=#05070d,bg=#00ffff,bold] %H:%M:%S #[fg=#00ffff,bg=#05070d]#[fg=#05070d,bg=#00e5ff,bold] #h "

# Window list
setw -g window-status-format " #[fg=#5c6370]#I #[fg=#c5c8c6]#W "
setw -g window-status-current-format "#[fg=#05070d,bg=#00ffff,bold] #I:#W #[fg=#00ffff,bg=#05070d]"
setw -g window-status-activity-style "fg=#ffcc00,bold"
setw -g window-status-bell-style "fg=#ff006e,bold"

# Neon pane borders
set -g pane-border-style "fg=#1f2233"
set -g pane-active-border-style "fg=#00ffff,bold"
set -g pane-border-lines heavy

# Command line + messages
set -g message-style "bg=#05070d,fg=#00e5ff,bold"
set -g mode-style "bg=#003b46,fg=#00ffff,bold"

# Pane title HUD
set -g pane-border-status top
set -g pane-border-format " #[fg=#00e5ff,bold]#P #[fg=#5c6370]│ #[fg=#00ffff]#{pane_current_command} #[fg=#5c6370]│ #[fg=#c5c8c6]#{s|/home/hugo|~|:pane_current_path} "

##### ──────────────────────────────────────────────
#####  Amp CLI compatibility
##### ──────────────────────────────────────────────

set -g allow-passthrough on
set -ga terminal-features ",*:hyperlinks"
set -s set-clipboard on
set -s extended-keys on
bind -n S-Enter send-keys -l "\x1b[13;2u"

##### ──────────────────────────────────────────────
#####  Optional Extras
##### ──────────────────────────────────────────────

# Tron grid status style
set -g status-style "bg=#05070d,fg=#00e5ff"

# Clean separators
set -g window-status-separator ""
