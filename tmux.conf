##### ──────────────────────────────────────────────
#####  General Settings
##### ──────────────────────────────────────────────

set -g mouse on
setw -g mode-keys vi
set-option -g remain-on-exit on

# Clipboard in visual mode
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -sel clip -i"
bind -T copy-mode-vi C-c send-keys -X copy-pipe-and-cancel "xclip -sel clip -i"
bind -T copy-mode y send-keys -X copy-pipe-and-cancel "xclip -sel clip -i"
set-option -g set-clipboard on

# Reduce escape delay (critical for Neovim responsiveness)
set -sg escape-time 0

# Faster key repeat
set -g repeat-time 300

# Increase scrollback
set -g history-limit 50000

# Pass through WAYLAND_DISPLAY for clipboard (xclip) in WSL
set -ga update-environment "WAYLAND_DISPLAY"

# Truecolor + cursor shape + synchronized output
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[6 q'
set -ga terminal-features ",*:Sync"

##### ──────────────────────────────────────────────
#####  Key Bindings
##### ──────────────────────────────────────────────

# Split panes in same directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# New windows in same directory
bind c new-window -c "#{pane_current_path}"

# Reorder windows by swapping with occupied slots
bind -r < swap-window -d -t :-1 \; display-message "⇠ swapped window left"
bind -r > swap-window -d -t :+1 \; display-message "swapped window right ⇢"
bind -n M-Left swap-window -d -t :-1 \; display-message "⇠ swapped window left"
bind -n M-Right swap-window -d -t :+1 \; display-message "swapped window right ⇢"

# Swap current window with a target index. Unlike move-window, occupied targets work.
bind . command-prompt -p "Swap with window index:" "swap-window -d -t '%%'"

# Interactively choose a target window to swap with the current window.
bind W choose-tree -w "swap-window -d -t '%%'"

# Quick reload (prefix + r)
bind r source-file ~/.tmux.conf \; display-message "🔁 Reloaded tmux.conf"

##### ──────────────────────────────────────────────
#####  Plugins (TPM)
##### ──────────────────────────────────────────────

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

run '~/.tmux/plugins/tpm/tpm'

##### ──────────────────────────────────────────────
#####  ⚡ CYAN NEON THEME
##### ──────────────────────────────────────────────

# Palette
set -g @primary '#00e5ff'     # Neon cyan
set -g @background '#0f111a'  # Deep dark background
set -g @text '#c5c8c6'        # Soft white text
set -g @muted '#5c6370'       # Dim grey
set -g @highlight '#00ffff'   # Brighter cyan

# Status bar
set -g status on
set -g status-bg '#0f111a'
set -g status-fg '#00e5ff'
set -g status-interval 5
set -g status-justify centre

# Fancy session name on left
set -g status-left-length 25
set -g status-left "#[fg=#0f111a,bg=#00e5ff,bold]  #S #[fg=#00e5ff,bg=#0f111a,nobold] "

# Right side: date, time, and host
set -g status-right "#[fg=#00e5ff]#[fg=#0f111a,bg=#00e5ff,bold] %Y-%m-%d  %H:%M #[fg=#00e5ff,bg=#0f111a]#[fg=#0f111a,bg=#00e5ff,bold] #h "

# Window list
setw -g window-status-format " #[fg=#5c6370]#I:#W "
setw -g window-status-current-format "#[fg=#0f111a,bg=#00e5ff,bold] #I:#W #[fg=#00e5ff,bg=#0f111a,nobold]"

# Pane borders
set -g pane-border-style "fg=#1f2233"
set -g pane-active-border-style "fg=#00e5ff"

# Command line + messages
set -g message-style "bg=#0f111a,fg=#00e5ff,bold"
set -g mode-style "bg=#0f111a,fg=#00e5ff,bold"

# Pane titles (top-right corner)
set -g pane-border-status top
set -g pane-border-format "#[fg=#00e5ff]#[fg=#0f111a,bg=#00e5ff,bold] #P #[fg=#00e5ff,bg=#0f111a]"

##### ──────────────────────────────────────────────
#####  Amp CLI compatibility
##### ──────────────────────────────────────────────

set -g allow-passthrough on
set -ga terminal-features ",*:hyperlinks"
set -s set-clipboard on
set -s extended-keys on
bind -n S-Enter send-keys -l "\x1b[13;2u"

##### ──────────────────────────────────────────────
#####  Optional Extras
##### ──────────────────────────────────────────────

# Slight transparency if your terminal supports it
set -g status-style "bg=#0f111a,fg=#00e5ff,dim"

# Clean separators
set -g window-status-separator ""
